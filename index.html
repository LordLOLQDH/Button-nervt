<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kostenlos Geld!</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
    }

.container {
        text-align: center;
        max-width: 600px;
        position: relative;
        width: 100%;
        height: 100vh;
    }

 h1 {
        font-size: 42px;
        color: white;
        margin-bottom: 15px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

 p {
        font-size: 18px;
        color: rgba(255,255,255,0.9);
        margin-bottom: 60px;
    }

.btn {
        position: absolute;
        background: #ff3b30;
        color: white;
        border: none;
        padding: 20px 40px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(255,59,48,0.4);
        transition: transform 0.1s;
        white-space: nowrap;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

.btn:hover {
        transform: translate(-50%, -50%) scale(1.05);
    }

.crumb {
        position: absolute;
        font-size: 14px;
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        pointer-events: none;
        animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
        to {
            opacity: 0;
            transform: translateY(-20px);
        }
    }

.hint {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.5);
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.5s;
    }

.hint.show {
        opacity: 1;
    }

.win-screen {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        z-index: 999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

.win-screen.show {
        display: flex;
    }

.win-screen h2 {
        font-size: 60px;
        color: #4ade80;
        margin-bottom: 20px;
    }

.win-screen p {
        font-size: 20px;
        color: white;
    }
</style>
</head>
<body>
    <div class="container" id="container">
        <h1>🎉 Gratis 1000€ 🎉</h1>
        <p>Nur ein Klick entfernt. Wenn du ihn erwischst.</p>
        <button class="btn" id="btn">Hier klicken!</button>
        <div class="hint" id="hint">Tipp: Nutze deine Tastatur</div>
    </div>

    <div class="win-screen" id="winScreen">
        <h2>Respekt</h2>
        <p>Tab + Enter > Maus. Du hast gewonnen.</p>
    </div>

<script>
    let unlocked = false;
    let hoverCount = 0;
    const btn = document.getElementById('btn');
    const container = document.getElementById('container');
    const hint = document.getElementById('hint');
    const winScreen = document.getElementById('winScreen');

    const crumbs = ['Zu langsam', 'Fast!', 'Nope', 'Nah dran', 'Versuch\'s nochmal', 'Haha', 'Erwischt', 'Daneben'];

    btn.addEventListener('mouseenter', () => {
        if (unlocked) return;

        hoverCount++;

        // Nach 3x Hovern Tipp einblenden
        if (hoverCount === 3) {
            hint.classList.add('show');
        }

        // Button wegrennen lassen
        const maxX = window.innerWidth - btn.offsetWidth - 40;
        const maxY = window.innerHeight - btn.offsetHeight - 40;

        const newX = Math.random() * maxX + 20;
        const newY = Math.random() * maxY + 20;

        // Krümel hinterlassen
        const crumb = document.createElement('div');
        crumb.className = 'crumb';
        crumb.textContent = crumbs[Math.floor(Math.random() * crumbs.length)];
        crumb.style.left = btn.offsetLeft + 'px';
        crumb.style.top = btn.offsetTop + 'px';
        document.body.appendChild(crumb);

        setTimeout(() => crumb.remove(), 2000);

        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
        btn.style.transform = 'translate(0, 0)';
    });

    // Tab + Enter = Win
    btn.addEventListener('click', (e) => {
        if (!e.detail || e.detail === 0) { // Keyboard click
            unlocked = true;
            winScreen.classList.add('show');
        }
    });

    // Touch Support: Auch wegrennen
    btn.addEventListener('touchstart', (e) => {
        if (unlocked) return;
        e.preventDefault();
        btn.dispatchEvent(new Event('mouseenter'));
    });
</script>
</body>
</html>
